<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterSite - Sistema Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #090a10; background-image: radial-gradient(at 0% 0%, rgba(0, 255, 136, 0.12) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(0, 180, 216, 0.12) 0px, transparent 50%); color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: rgba(18, 20, 29, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); backdrop-filter: blur(16px); text-align: center; }
        .logo { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, #00ff88 0%, #00b4d8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; letter-spacing: -0.5px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: #cbd5e1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.12); background: rgba(10, 11, 18, 0.8); color: #fff; font-size: 14px; outline: none; transition: all 0.25s ease; }
        .input-group input:focus { border-color: #00ff88; box-shadow: 0 0 12px rgba(0, 255, 136, 0.2); background: rgba(15, 17, 26, 0.95); }
        .btn-primary { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg, #00ff88 0%, #00b4d8 100%); color: #08090e; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        .btn-google { width: 100%; padding: 13px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; transition: background 0.2s; }
        .btn-google:hover { background: rgba(255, 255, 255, 0.12); }
        .btn-google svg { width: 18px; height: 18px; }

        .divider { display: flex; align-items: center; text-align: center; color: #64748b; font-size: 12px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .divider span { padding: 0 10px; }

        .btn-danger { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #ef4444; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .toggle-text { margin-top: 16px; font-size: 13px; color: #94a3b8; }
        .toggle-btn { background: none; border: none; color: #00b4d8; font-weight: 600; cursor: pointer; font-size: 13px; text-decoration: underline; }
        #msg { margin-top: 20px; font-size: 13px; font-weight: 600; padding: 10px 14px; border-radius: 10px; word-break: break-word; }
        .msg-success { display: block !important; color: #00ff88; background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); }
        .msg-error { display: block !important; color: #f87171; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
        .user-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 20px; margin: 20px 0 10px 0; text-align: left; }
        .user-info { margin-bottom: 12px; }
        .user-info span { font-size: 11px; color: #64748b; text-transform: uppercase; display: block; }
        .user-info p { font-size: 15px; font-weight: 600; color: #f1f5f9; }
        .badge-online { display: inline-block; padding: 4px 10px; background: rgba(0, 255, 136, 0.15); color: #00ff88; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 15px; }
        .forgot-btn { background: none; border: none; float: right; margin-top: 6px; font-size: 12px; color: #00b4d8; cursor: pointer; text-decoration: underline; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">MasterSite</div>

        <div id="loginSection">
            <p class="subtitle">Acesse sua conta para continuar</p>
            
            <button type="button" class="btn-google" id="btnGoogleLogin">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
                Entrar com Google
            </button>

            <div class="divider"><span>OU COM E-MAIL E SENHA</span></div>

            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="loginEmail" required placeholder="seu-email@gmail.com" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="forgot-btn" id="btnForgot">Esqueci a senha</button>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 25px;">Entrar no Sistema</button>
            </form>
            <p class="toggle-text">Não possui conta? <button type="button" class="toggle-btn" id="btnGoToReg">Cadastrar-se</button></p>
        </div>

        <div id="regSection" class="hidden">
            <p class="subtitle">Crie seu perfil seguro</p>
            <form id="regForm" autocomplete="off">
                <div class="input-group">
                    <label>Nome de Usuário Único</label>
                    <input type="text" id="regName" required placeholder="Ex: PlayerPro" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="regEmail" required placeholder="seu-email@gmail.com" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Senha Segura</label>
                    <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary">Criar Minha Conta</button>
            </form>
            <p class="toggle-text">Já tem uma conta? <button type="button" class="toggle-btn" id="btnGoToLogin">Fazer Login</button></p>
        </div>

        <div id="googleSetupSection" class="hidden">
            <p class="subtitle">Defina seu Nome Único e Senha para habilitar também o login por E-mail.</p>
            <form id="googleSetupForm" autocomplete="off">
                <div class="input-group">
                    <label>Nome de Usuário Customizado</label>
                    <input type="text" id="googleName" required placeholder="Ex: Mestre123" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Crie uma Senha de Acesso</label>
                    <input type="password" id="googlePassword" required placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary">Finalizar Cadastro</button>
            </form>
        </div>

        <div id="dashSection" class="hidden">
            <span class="badge-online">● Conta Ativa</span>
            <div class="user-box">
                <div class="user-info">
                    <span>Usuário</span>
                    <p id="welcomeUser">-</p>
                </div>
                <div class="user-info" style="margin-top: 14px;">
                    <span>E-mail Registrado</span>
                    <p id="userEmailDisplay" style="color: #00b4d8;">-</p>
                </div>
            </div>
            <button type="button" id="btnLogout" class="btn-danger">Encerrar Sessão</button>
        </div>

        <p id="msg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            sendPasswordResetEmail, 
            signOut, 
            onAuthStateChanged,
            updateProfile,
            updatePassword,
            EmailAuthProvider,
            linkWithCredential,
            GoogleAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        import { 
            getDatabase, 
            ref, 
            get, 
            set 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGD9DZDFp0w9baW8jiqgGGfkasAvqreY0",
            authDomain: "site-ec6fd.firebaseapp.com",
            databaseURL: "https://site-ec6fd-default-rtdb.firebaseio.com",
            projectId: "site-ec6fd",
            storageBucket: "site-ec6fd.firebasestorage.app",
            messagingSenderId: "338689686380",
            appId: "1:338689686380:web:509aebb8d64694a0e1d149"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const rtdb = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });

        function showMsg(text, type) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.className = type === 'success' ? 'msg-success' : 'msg-error';
        }

        function clearMsg() {
            const msg = document.getElementById('msg');
            msg.innerText = '';
            msg.className = '';
        }

        function clearInputs() {
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        // VERIFICA SE O NOME DE USUÁRIO JÁ EXISTE
        async function isUsernameTaken(username) {
            const cleanName = username.trim().toLowerCase().replace(/[^a-z0-9]/g, "_");
            const snapshot = await get(ref(rtdb, "usernames/" + cleanName));
            return snapshot.exists();
        }

        // REGISTRA O NOME DE USUÁRIO NO BANCO
        async function saveUserData(uid, username, email) {
            const cleanName = username.trim().toLowerCase().replace(/[^a-z0-9]/g, "_");
            await set(ref(rtdb, "usernames/" + cleanName), uid);
            await set(ref(rtdb, "users/" + uid), {
                displayName: username.trim(),
                email: email,
                hasSetupCompleted: true
            });
        }

        // ENTRAR COM GOOGLE
        document.getElementById('btnGoogleLogin').onclick = async () => {
            clearMsg();
            showMsg('Conectando ao Google...', 'success');
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                const userSnap = await get(ref(rtdb, "users/" + user.uid));

                if (userSnap.exists() && userSnap.val().hasSetupCompleted) {
                    showMsg('Bem-vindo!', 'success');
                } else {
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('regSection').classList.add('hidden');
                    document.getElementById('googleSetupSection').classList.remove('hidden');
                    showMsg('Autorizado! Escolha um Nome de Usuário único e sua senha.', 'success');
                }
            } catch (err) {
                await signOut(auth);
                if (err.code === 'auth/popup-closed-by-user') {
                    showMsg('Autorização cancelada.', 'error');
                } else {
                    showMsg('Erro no login: ' + err.message, 'error');
                }
            }
        };

        // FINALIZAR SETUP DO GOOGLE
        document.getElementById('googleSetupForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('googleName').value.trim();
            const password = document.getElementById('googlePassword').value;

            if (password.length < 6) {
                showMsg('A senha deve ter no mínimo 6 caracteres.', 'error');
                return;
            }

            showMsg('Verificando nome...', 'success');

            try {
                const taken = await isUsernameTaken(name);
                if (taken) {
                    showMsg('Este nome de usuário já existe! Escolha outro.', 'error');
                    return;
                }

                const user = auth.currentUser;
                await updateProfile(user, { displayName: name });

                try {
                    await updatePassword(user, password);
                } catch (pErr) {
                    const credential = EmailAuthProvider.credential(user.email, password);
                    await linkWithCredential(user, credential);
                }

                await saveUserData(user.uid, name, user.email);

                showMsg('Cadastro concluído!', 'success');
                clearInputs();

                document.getElementById('googleSetupSection').classList.add('hidden');
                document.getElementById('dashSection').classList.remove('hidden');
                document.getElementById('welcomeUser').innerText = name;
                document.getElementById('userEmailDisplay').innerText = user.email;

            } catch (err) {
                showMsg('Erro ao salvar: ' + err.message, 'error');
            }
        };

        // CADASTRO NORMAL VIA E-MAIL
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;

            if (password.length < 6) {
                showMsg('A senha precisa ter pelo menos 6 caracteres.', 'error');
                return;
            }

            showMsg('Verificando nome...', 'success');

            try {
                const taken = await isUsernameTaken(name);
                if (taken) {
                    showMsg('Este nome de usuário já está em uso. Escolha outro!', 'error');
                    return;
                }

                showMsg('Criando conta...', 'success');
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await updateProfile(user, { displayName: name });
                await saveUserData(user.uid, name, email);

                showMsg('Conta criada com sucesso!', 'success');
                clearInputs();
            } catch (err) {
                showMsg('Erro no cadastro: ' + err.message, 'error');
            }
        };

        // LOGIN TRADICIONAL
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;

            showMsg('Validando...', 'success');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMsg('Acesso permitido!', 'success');
                clearInputs();
            } catch (err) {
                showMsg('E-mail ou senha incorretos.', 'error');
            }
        };

        // ESQUECI A SENHA
        document.getElementById('btnForgot').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            if (!email) {
                showMsg('Digite seu e-mail no campo acima primeiro.', 'error');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showMsg('E-mail de redefinição enviado!', 'success');
            } catch (err) {
                showMsg('Erro: ' + err.message, 'error');
            }
        };

        // NAVEGAÇÃO
        document.getElementById('btnGoToReg').onclick = () => {
            clearMsg();
            clearInputs();
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('regSection').classList.remove('hidden');
        };

        document.getElementById('btnGoToLogin').onclick = () => {
            clearMsg();
            clearInputs();
            document.getElementById('regSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        };

        // SAIR
        document.getElementById('btnLogout').onclick = async () => {
            await signOut(auth);
            clearMsg();
            clearInputs();
        };

        // MONITOR DE ESTADO DA CONTA
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userSnap = await get(ref(rtdb, "users/" + user.uid));
                    if (userSnap.exists() && userSnap.val().hasSetupCompleted) {
                        document.getElementById('loginSection').classList.add('hidden');
                        document.getElementById('regSection').classList.add('hidden');
                        document.getElementById('googleSetupSection').classList.add('hidden');
                        document.getElementById('dashSection').classList.remove('hidden');

                        document.getElementById('welcomeUser').innerText = userSnap.val().displayName || user.displayName;
                        document.getElementById('userEmailDisplay').innerText = user.email;
                        clearInputs();
                    } else {
                        document.getElementById('loginSection').classList.add('hidden');
                        document.getElementById('regSection').classList.add('hidden');
                        document.getElementById('googleSetupSection').classList.remove('hidden');
                    }
                } catch (e) {
                    console.log("Aguardando definição de perfil...");
                }
            } else {
                document.getElementById('dashSection').classList.add('hidden');
                document.getElementById('googleSetupSection').classList.add('hidden');
                document.getElementById('regSection').classList.add('hidden');
                document.getElementById('loginSection').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
