cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterSite - Sistema Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #090a10; background-image: radial-gradient(at 0% 0%, rgba(0, 255, 136, 0.12) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(0, 180, 216, 0.12) 0px, transparent 50%); color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: rgba(18, 20, 29, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); backdrop-filter: blur(16px); text-align: center; }
        .logo { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, #00ff88 0%, #00b4d8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; letter-spacing: -0.5px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: #cbd5e1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.12); background: rgba(10, 11, 18, 0.8); color: #fff; font-size: 14px; outline: none; transition: all 0.25s ease; }
        .input-group input:focus { border-color: #00ff88; box-shadow: 0 0 12px rgba(0, 255, 136, 0.2); background: rgba(15, 17, 26, 0.95); }
        .btn-primary { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg, #00ff88 0%, #00b4d8 100%); color: #08090e; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-danger { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #ef4444; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .toggle-text { margin-top: 16px; font-size: 13px; color: #94a3b8; }
        .toggle-btn { background: none; border: none; color: #00b4d8; font-weight: 600; cursor: pointer; font-size: 13px; text-decoration: underline; }
        #msg { margin-top: 20px; font-size: 13px; font-weight: 600; padding: 10px 14px; border-radius: 10px; word-break: break-word; }
        .msg-success { display: block !important; color: #00ff88; background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); }
        .msg-error { display: block !important; color: #f87171; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
        .user-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 20px; margin: 20px 0 10px 0; text-align: left; }
        .user-info { margin-bottom: 12px; }
        .user-info span { font-size: 11px; color: #64748b; text-transform: uppercase; display: block; }
        .user-info p { font-size: 15px; font-weight: 600; color: #f1f5f9; }
        .badge-online { display: inline-block; padding: 4px 10px; background: rgba(0, 255, 136, 0.15); color: #00ff88; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 15px; }
        .forgot-btn { background: none; border: none; float: right; margin-top: 6px; font-size: 12px; color: #00b4d8; cursor: pointer; text-decoration: underline; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">MasterSite</div>

        <div id="loginSection">
            <p class="subtitle">Acesse sua conta para continuar</p>
            <form id="loginForm">
                <div class="input-group">
                    <label>E-mail (Gmail)</label>
                    <input type="email" id="loginEmail" required placeholder="seu-email@gmail.com">
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                    <button type="button" class="forgot-btn" id="btnForgot">Esqueci a senha</button>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 25px;">Entrar no Sistema</button>
            </form>
            <p class="toggle-text">Não possui conta? <button type="button" class="toggle-btn" id="btnGoToReg">Cadastrar-se</button></p>
        </div>

        <div id="regSection" class="hidden">
            <p class="subtitle">Crie seu perfil no sistema</p>
            <form id="regForm">
                <div class="input-group">
                    <label>Nome de Usuário</label>
                    <input type="text" id="regName" required placeholder="Seu nome ou nick">
                </div>
                <div class="input-group">
                    <label>E-mail (Gmail)</label>
                    <input type="email" id="regEmail" required placeholder="seu-email@gmail.com">
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" class="btn-primary">Criar Minha Conta</button>
            </form>
            <p class="toggle-text">Já tem uma conta? <button type="button" class="toggle-btn" id="btnGoToLogin">Fazer Login</button></p>
        </div>

        <div id="dashSection" class="hidden">
            <span class="badge-online">● Conta Ativa</span>
            <div class="user-box">
                <div class="user-info">
                    <span>Usuário</span>
                    <p id="welcomeUser">-</p>
                </div>
                <div class="user-info" style="margin-top: 14px;">
                    <span>E-mail Registrado</span>
                    <p id="userEmailDisplay" style="color: #00b4d8;">-</p>
                </div>
            </div>
            <button type="button" id="btnLogout" class="btn-danger">Encerrar Sessão</button>
        </div>

        <p id="msg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            sendPasswordResetEmail, 
            signOut, 
            onAuthStateChanged,
            updateProfile 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGD9DZDFp0w9baW8jiqgGGfkasAvqreY0",
            authDomain: "site-ec6fd.firebaseapp.com",
            databaseURL: "https://site-ec6fd-default-rtdb.firebaseio.com",
            projectId: "site-ec6fd",
            storageBucket: "site-ec6fd.firebasestorage.app",
            messagingSenderId: "338689686380",
            appId: "1:338689686380:web:509aebb8d64694a0e1d149"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function showMsg(text, type) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.className = type === 'success' ? 'msg-success' : 'msg-error';
        }

        function clearMsg() {
            const msg = document.getElementById('msg');
            msg.innerText = '';
            msg.className = '';
        }

        document.getElementById('btnGoToReg').onclick = () => {
            clearMsg();
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('regSection').classList.remove('hidden');
        };

        document.getElementById('btnGoToLogin').onclick = () => {
            clearMsg();
            document.getElementById('regSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        };

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;

            showMsg('Processando cadastro...', 'success');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                showMsg('Conta criada com sucesso!', 'success');
            } catch (err) {
                showMsg('Erro (' + err.code + '): ' + err.message, 'error');
            }
        };

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;

            showMsg('Autenticando...', 'success');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMsg('Login efetuado!', 'success');
            } catch (err) {
                showMsg('Erro (' + err.code + '): ' + err.message, 'error');
            }
        };

        document.getElementById('btnForgot').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();

            if (!email) {
                showMsg('Digite o e-mail no campo acima antes de clicar em Esqueci a senha.', 'error');
                return;
            }

            showMsg('Enviando e-mail de redefinição...', 'success');

            try {
                await sendPasswordResetEmail(auth, email);
                showMsg('E-mail enviado! Verifique a caixa de entrada ou spam.', 'success');
            } catch (err) {
                showMsg('Erro (' + err.code + '): ' + err.message, 'error');
            }
        };

        document.getElementById('btnLogout').onclick = async () => {
            await signOut(auth);
            clearMsg();
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('regSection').classList.add('hidden');
                document.getElementById('dashSection').classList.remove('hidden');
                document.getElementById('welcomeUser').innerText = user.displayName || 'Usuário';
                document.getElementById('userEmailDisplay').innerText = user.email;
            } else {
                document.getElementById('dashSection').classList.add('hidden');
                document.getElementById('loginSection').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
EOF
